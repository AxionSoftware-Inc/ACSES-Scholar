services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acses_frontend
    restart: unless-stopped
    env_file:
      - deploy/env/frontend.env
    depends_on:
      backend:
        condition: service_started
    expose:
      - "3000"
    networks:
      - acses

  backend:
    build:
      context: ./ACSES Scholar backend
      dockerfile: Dockerfile
    container_name: acses_backend
    restart: unless-stopped
    env_file:
      - deploy/env/backend.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    expose:
      - "8000"
    networks:
      - acses

  db:
    image: postgres:17-alpine
    container_name: acses_db
    restart: unless-stopped
    env_file:
      - deploy/env/db.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - acses

  nginx:
    image: nginx:1.27-alpine
    container_name: acses_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/var/www/static:ro
      - django_media:/var/www/media:ro
    networks:
      - acses

volumes:
  postgres_data:
  django_static:
  django_media:

networks:
  acses:
    driver: bridge
